# Configuración de Nixpacks para Railway
# tsx ejecuta TypeScript directamente — no hace falta compilar previamente.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = []   # sin build: tsx transpila en runtime

[start]
cmd = "npx tsx packages/api/src/index.ts"
