<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0d0d1a"/>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#1e1040"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
  </defs>
  <!-- Marco dorado -->
  <rect x="60" y="100" width="392" height="312" rx="20" fill="none" stroke="#f0c040" stroke-width="8"/>
  <!-- Rodillos: 3 columnas de 3 símbolos -->
  <!-- Col 1 -->
  <rect x="80" y="120" width="100" height="90" rx="10" fill="#1e1e35"/>
  <rect x="80" y="220" width="100" height="90" rx="10" fill="#1e1e35"/>
  <rect x="80" y="320" width="100" height="80" rx="10" fill="#1e1e35"/>
  <!-- Col 2 -->
  <rect x="206" y="120" width="100" height="90" rx="10" fill="#1e1e35"/>
  <rect x="206" y="220" width="100" height="90" rx="10" fill="#1e1e35" stroke="#f0c040" stroke-width="3"/>
  <rect x="206" y="320" width="100" height="80" rx="10" fill="#1e1e35"/>
  <!-- Col 3 -->
  <rect x="332" y="120" width="100" height="90" rx="10" fill="#1e1e35"/>
  <rect x="332" y="220" width="100" height="90" rx="10" fill="#1e1e35"/>
  <rect x="332" y="320" width="100" height="80" rx="10" fill="#1e1e35"/>
  <!-- 7 central -->
  <text x="256" y="280" font-size="64" font-weight="900" fill="#f0c040" text-anchor="middle" font-family="system-ui">7</text>
  <!-- Texto -->
  <text x="256" y="470" font-size="36" font-weight="800" fill="#f0c040" text-anchor="middle" font-family="system-ui" letter-spacing="2">SPIN</text>
</svg>
